<!DOCTYPE html>
<html>

<head>
    <title>Data Transaksi</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

</head>

<body>

    <div class="container mt-5">

        <h3>Data Transaksi Keuangan</h3>

        <a href="form.html" class="btn btn-primary mb-3">Tambah Data</a>

        <table id="tabelTransaksi" class="table table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tanggal</th>
                    <th>Keterangan</th>
                    <th>Jenis</th>
                    <th>Jumlah</th>
                    <th>Aksi</th>
                </tr>
            </thead>
        </table>

    </div>

    <script>

        $(function () {

            $('#tabelTransaksi').DataTable({
                ajax: { url: '/api/transaksi', dataSrc: '' },
                columns: [
                    { data: 'id' },
                    { data: 'tanggal' },
                    { data: 'keterangan' },
                    { data: 'jenis' },
                    { data: 'jumlah' },
                    {
                        data: 'id',
                        render: id => `
                <button class="btn btn-warning btn-sm" onclick="edit(${id})">Edit</button>
                <button class="btn btn-danger btn-sm" onclick="hapus(${id})">Hapus</button>
                `
                    }
                ]
            })

        })

        function hapus(id) {
            fetch('/api/transaksi/' + id, { method: 'DELETE' })
                .then(r => r.json())
                .then(r => {
                    alert(r.message)
                    location.reload()
                })
        }

        function edit(id) {
            window.location.href = "form.html?id=" + id
        }

    </script>

</body>

</html>
