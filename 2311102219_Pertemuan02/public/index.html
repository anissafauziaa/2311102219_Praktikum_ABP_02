<!DOCTYPE html>
<html>

<head>
    <title>Dashboard Keuangan</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

    <div class="container mt-5">

        <h2>Sistem Pencatatan Keuangan</h2>

        <a href="form.html" class="btn btn-primary mt-3">Tambah Transaksi</a>
        <a href="data.html" class="btn btn-success mt-3">Lihat Data</a>

        <hr>

        <h4>Ringkasan</h4>

        <div class="row">

            <div class="col-md-4">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        Total Pemasukan
                        <h3 id="pemasukan">0</h3>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card bg-danger text-white">
                    <div class="card-body">
                        Total Pengeluaran
                        <h3 id="pengeluaran">0</h3>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        Saldo
                        <h3 id="saldo">0</h3>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>

        $(function () {

            $.get("/api/transaksi", data => {

                let pemasukan = 0, pengeluaran = 0

                data.forEach(d => {
                    d.jenis === "Pemasukan" ? pemasukan += +d.jumlah : pengeluaran += +d.jumlah
                })

                $("#pemasukan").text("Rp " + pemasukan.toLocaleString())
                $("#pengeluaran").text("Rp " + pengeluaran.toLocaleString())
                $("#saldo").text("Rp " + (pemasukan - pengeluaran).toLocaleString())

            })

        })

    </script>

</body>

</html>
