<!DOCTYPE html>
<html>

<head>
    <title>Tambah Transaksi</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

    <div class="container mt-5">

        <h3>Tambah Transaksi Keuangan</h3>

        <form id="formTransaksi">

            <div class="mb-3">
                <label>Tanggal</label>
                <input type="date" class="form-control" id="tanggal">
            </div>

            <div class="mb-3">
                <label>Keterangan</label>
                <input type="text" class="form-control" id="keterangan">
            </div>

            <div class="mb-3">
                <label>Jenis</label>
                <select class="form-control" id="jenis">
                    <option>Pemasukan</option>
                    <option>Pengeluaran</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Jumlah</label>
                <input type="number" class="form-control" id="jumlah">
            </div>

            <button class="btn btn-primary">Simpan</button>
            <a href="data.html" class="btn btn-success">Lihat Data</a>

        </form>

    </div>

    <script>

        const id = new URLSearchParams(location.search).get("id")

        if (id) {
            fetch("/api/transaksi")
                .then(r => r.json())
                .then(d => {
                    const t = d.find(x => x.id == id)
                    if (t) {
                        $("#tanggal").val(t.tanggal)
                        $("#keterangan").val(t.keterangan)
                        $("#jenis").val(t.jenis)
                        $("#jumlah").val(t.jumlah)
                    }
                })
        }

        $("#formTransaksi").submit(e => {
            e.preventDefault()

            const data = {
                tanggal: $("#tanggal").val(),
                keterangan: $("#keterangan").val(),
                jenis: $("#jenis").val(),
                jumlah: $("#jumlah").val()
            }

            fetch(id ? "/api/transaksi/" + id : "/api/transaksi", {
                method: id ? "PUT" : "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
                .then(r => r.json())
                .then(r => {
                    alert(r.message)
                    location.href = "data.html"
                })

        })

    </script>

</body>

</html>
